name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run Linting
        run: npm run lint
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit Tests
        run: npm test
